# ── Plugin Manager ───────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'

# ── Plugins ──────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'alexwforsythe/tmux-which-key'

# ── Prefix: Ctrl+A ──────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── General Settings ────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-option -g allow-rename off
set -sg escape-time 0

# ── Window Bindings ─────────────────────────────────────────────
bind c new-window
bind -n S-Left previous-window
bind -n S-Right next-window

# ── Pane Bindings ───────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Alt+arrows — navigate panes (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with Prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Mouse & Clipboard ──────────────────────────────────────────
set -g @yank_selection_mouse 'clipboard'

# ── Double-tap Escape to Detach ─────────────────────────────────
# First Escape enters the escape_pressed table (expires after repeat-time),
# second Escape detaches. Won't interfere with vim since single Escape
# just briefly enters the table and times out.
bind -n Escape switch-client -T escape_pressed
bind -T escape_pressed Escape detach-client

# ── Popups & Floating Panes ────────────────────────────────────
# Prefix g — lazygit in a dedicated window (closes window on exit)
bind g new-window -n "lazygit" "lazygit"

# ── Floax Settings ──────────────────────────────────────────────
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-bind '-n C-f'
set -g @floax-border-color '#a5d5fe'
set -g @floax-text-color '#e4e4e4'

# ── Fuzzy Finders ───────────────────────────────────────────────
# Prefix f — fzf pane search
bind f run-shell "tmux list-panes -a -F '#{session_name}:#{window_index}.#{pane_index} #{pane_current_command} #{pane_current_path}' | fzf-tmux -p 80%,60% | cut -d' ' -f1 | xargs tmux switch-client -t"

# Prefix Z — zoxide directory picker with eza tree preview
bind Z run-shell "zoxide query -l | fzf-tmux -p 80%,60% --preview 'eza --tree --level=2 --color=always {}' | xargs -I{} tmux send-keys 'cd {} && clear' Enter"

# ── Continuum: auto-save & restore ──────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# ── Image passthrough (Kitty graphics protocol) ─────────────────
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ── True color & terminal ───────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-features ",xterm-ghostty:clipboard:ccolour:cstyle:focus:title:mouse"

# ── Warp Dark Theme (official colors) ─────────────────────────────
# Status bar — gold on prefix press, sky blue normally
set -g status-style 'bg=#000000,fg=#ffffff'
set -g status-left-style 'bg=#000000,bold'
set -g status-right-style 'bg=#000000,fg=#ffffff'
set -g status-left '#{?client_prefix,#[fg=#fefdc2],#[fg=#a5d5fe]} #S '
set -g status-right ' %H:%M  %d-%b '
set -g status-left-length 20
set -g status-right-length 40

# Window tabs — current = bold white, inactive = grey
set -g window-status-style 'bg=#000000,fg=#616161'
set -g window-status-current-style 'bg=#1a1a2e,fg=#ffffff,bold'
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '

# Pane borders — dark grey, no active highlight
set -g pane-border-style 'fg=#333333'
set -g pane-active-border-style 'fg=#333333'

# Message / command line
set -g message-style 'bg=#000000,fg=#a5d5fe'

# Clock
set -g clock-mode-colour '#a5d5fe'

# ── Initialize TPM (MUST be last) ───────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# ── Post-TPM overrides ─────────────────────────────────────────
set -g mouse on
