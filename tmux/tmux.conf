# ── Plugin Manager ───────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'

# ── Plugins ──────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'thepante/tmux-git-autofetch'

# ── Prefix: Ctrl+A ──────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── General Settings ────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-option -g allow-rename off
setw -g automatic-rename off
set -sg escape-time 0

# ── Window Bindings ─────────────────────────────────────────────
bind c new-window
bind -n S-Left previous-window
bind -n S-Right next-window

# ── Pane Bindings ───────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Alt+arrows — navigate panes (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with Prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Mouse & Clipboard ──────────────────────────────────────────
set -g mouse on
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-and-cancel'

# ── Double-tap Escape to Detach ─────────────────────────────────
# First Escape enters the escape_pressed table (expires after repeat-time),
# second Escape detaches. Won't interfere with vim since single Escape
# just briefly enters the table and times out.
bind -n Escape switch-client -T escape_pressed
bind -T escape_pressed Escape detach-client

# ── Popups & Floating Panes ────────────────────────────────────
# Prefix g — lazygit in a dedicated window (closes window on exit)
bind g new-window -n "lazygit" "lazygit"

# ── Floax Settings ──────────────────────────────────────────────
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-bind 'C-f'
set -g @floax-border-color '#282828'
set -g @floax-text-color '#A0A0A0'

# Manual floax bindings (bypass plugin's broken path resolution)
bind C-f run-shell '~/.tmux/plugins/tmux-floax/scripts/floax.sh'
bind P run-shell '~/.tmux/plugins/tmux-floax/scripts/menu.sh'

# ── Popup Style (Vesper) ───────────────────────────────────────
set -g popup-style 'bg=#101010'
set -g popup-border-style 'fg=#282828'

# ── Fuzzy Finders ───────────────────────────────────────────────
# Prefix f — fzf pane search
bind f run-shell "tmux list-panes -a -F '#{session_name}:#{window_index}.#{pane_index} #{pane_current_command} #{pane_current_path}' | fzf-tmux -p 80%,60% | cut -d' ' -f1 | xargs tmux switch-client -t"

# Prefix Z — zoxide directory picker with eza tree preview
bind Z run-shell "zoxide query -l | fzf-tmux -p 80%,60% --preview 'eza --tree --level=2 --color=always {}' | xargs -I{} tmux send-keys 'cd {} && clear' Enter"

# ── Continuum: auto-save & restore ──────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-strategy-nvim 'session'

# ── Image passthrough (Kitty graphics protocol) ─────────────────
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ── True color & terminal ───────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-features ",xterm-ghostty:clipboard:ccolour:cstyle:focus:title:mouse"

# ── Vesper Theme (nexxeln/dots) ───────────────────────────────────
set -g status-position top
set -g status-justify left
set -g status-interval 1

# Status bar (2 lines: content + spacer)
set -g status 2
set -g status-style 'bg=#101010,fg=#A0A0A0'
set -g status-format[1] '#[bg=#101010]'

# Left: session name in accent
set -g status-left '#[fg=#FFC799,bold] #S #[fg=#5C5C5C]│ '
set -g status-left-length 20

# Right: time only (12h)
set -g status-right '#[fg=#A0A0A0]%-I:%M %p '
set -g status-right-length 50

# Window tabs
setw -g window-status-format '#[fg=#5C5C5C] #I #W '
setw -g window-status-current-format '#[fg=#FFFFFF,bold] #I #W '
setw -g window-status-separator ''

# Pane borders
set -g pane-border-lines simple
set -g pane-border-style 'fg=#282828'
set -g pane-active-border-style 'fg=#282828'

# Message / command
set -g message-style 'bg=#232323,fg=#FFFFFF'
set -g message-command-style 'bg=#232323,fg=#FFFFFF'

# Copy mode
setw -g mode-style 'bg=#232323,fg=#FFFFFF'

# Clock
setw -g clock-mode-colour '#FFC799'

# ── Initialize TPM (MUST be last) ───────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

